<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Website</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">🍔 Food</div>
</header>

<section class="banner">
  <h2>Delicious Food Delivered to Your Door</h2>
</section>

<section class="food-menu">
  <h2>Food Menu</h2>

  <div class="grid">

    <div class="card">
      <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Pizza-3007395.jpg" alt="Pizza">
      <h3>Pizza</h3>
      <p>$10</p>
      <a href="pizza.html">View</a>
    </div>

    <div class="card">
      <img src="https://upload.wikimedia.org/wikipedia/commons/4/4f/Cheeseburger.jpg" alt="Burger">
      <h3>Burger</h3>
      <p>$8</p>
      <a href="burger.html">View</a>
    </div>

    <div class="card">
      <img src="https://upload.wikimedia.org/wikipedia/commons/2/2c/Fried-Chicken-Set.jpg" alt="Chicken">
      <h3>Fried Chicken</h3>
      <p>$12</p>
      <a href="chicken.html">View</a>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 Food Website</p>
</footer>

</body>
</html>
